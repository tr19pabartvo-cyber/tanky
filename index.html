<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBA Monster Tanks 1v1 - Průchozí Bludiště</title>
    <style>
        body {
            background-color: #283848; 
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 {
            margin-top: 0;
            text-transform: uppercase;
            font-size: 2rem;
            color: #f8b060;
            text-shadow: 3px 3px 0px #382818;
            letter-spacing: 2px;
        }
        #game-container {
            position: relative;
        }
        canvas {
            border: 8px solid #506880;
            border-radius: 4px;
            box-shadow: 0 12px 0px #182028;
            image-rendering: pixelated; 
        }
        #ui {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            margin-bottom: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            background: #405870;
            padding: 10px 20px;
            border: 4px solid #506880;
            box-shadow: 0 6px 0px #182028;
            box-sizing: border-box;
        }
        .p1-ui { color: #f87870; text-shadow: 2px 2px #301010; }
        .p2-ui { color: #7098f8; text-shadow: 2px 2px #101030; }
        #arena-title { color: #f8d050; text-shadow: 2px 2px #403000; text-transform: uppercase; }
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #f8f8f8;
            color: #383838;
            padding: 30px 50px;
            border: 6px solid #405870;
            box-shadow: 8px 8px 0px #182028;
            text-align: center;
            z-index: 10;
        }
        button {
            background: #a0e0a0;
            color: #103010;
            border: 3px solid #385838;
            padding: 12px 24px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 0px #385838;
            text-transform: uppercase;
        }
        button:hover { 
            background: #b8f8b8; 
            transform: translateY(2px);
            box-shadow: 0 2px 0px #385838;
        }
    </style>
</head>
<body>

    <h1>GBA Tank Tournament</h1>
    
    <div id="ui">
        <div class="p1-ui" id="p1-stats">Hráč 1 | Životy: 3</div>
        <div id="arena-title">Načítání oblasti...</div>
        <div class="p2-ui" id="p2-stats">Hráč 2 | Životy: 3</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="game-over">
            <h2 id="winner-text" style="margin-top: 0; font-size: 1.6rem; text-transform: uppercase;">Hráč vyhrál!</h2>
            <button id="next-btn" onclick="nextArena()">Další oblast ➔</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Klávesnice
        const keys = {};
        window.addEventListener('keydown', e => {
            if(["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
            keys[e.code] = true;
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // 5 stoprocentně průchozích bludišť (GBA Pokémon styl)
        const arenaThemes = [
            {
                name: "Oblasti: Viridian Forest",
                bgColor: "#58b058", // Tráva
                pathColor: "#e8c078", // Hliněná cesta
                wallType: "tree",
                walls: [
                    // Vertikální cik-cak zábrany s širokými průchody (160px)
                    { x: 160, y: 0, w: 60, h: 220 },
                    { x: 160, y: 380, w: 60, h: 220 },
                    
                    { x: 320, y: 120, w: 60, h: 360 }, // průchod nahoře i dole
                    
                    { x: 480, y: 0, w: 60, h: 220 },
                    { x: 480, y: 380, w: 60, h: 220 },
                    
                    { x: 620, y: 120, w: 60, h: 360 }
                ]
            },
            {
                name: "Oblasti: Mt. Moon",
                bgColor: "#a08878", // Jeskynní dno
                pathColor: "#887060", // Tmavší vychozená trasa
                wallType: "rock",
                walls: [
                    // Průchozí horizontální prstence (středový koridor je zcela volný)
                    { x: 0, y: 140, w: 260, h: 60 },
                    { x: 540, y: 140, w: 260, h: 60 },
                    
                    { x: 160, y: 280, w: 480, h: 60 }, // obklopeno širokými bočními průjezdy
                    
                    { x: 0, y: 420, w: 260, h: 60 },
                    { x: 540, y: 420, w: 260, h: 60 }
                ]
            },
            {
                name: "Zápas: Vermilion Gym",
                bgColor: "#f8d878", // Stadion podlaha
                pathColor: "#e0b858",
                wallType: "gym-block",
                walls: [
                    // Taktické pilíře rozmístěné tak, aby se daly pohodlně objíždět ze všech stran
                    { x: 180, y: 100, w: 80, h: 80 },
                    { x: 180, y: 420, w: 80, h: 80 },
                    
                    { x: 360, y: 250, w: 80, h: 100 }, // centrální blok
                    
                    { x: 540, y: 100, w: 80, h: 80 },
                    { x: 540, y: 420, w: 80, h: 80 }
                ]
            },
            {
                name: "Oblasti: Cinnabar Mansion",
                bgColor: "#d0a080", // Staré dřevěné podlahy
                pathColor: "#b08060",
                wallType: "ruins",
                walls: [
                    // Komnatové bludiště s garantovanými dveřmi
                    { x: 120, y: 120, w: 60, h: 360 },
                    { x: 620, y: 120, w: 60, h: 360 },
                    
                    { x: 280, y: 0, w: 60, h: 200 },
                    { x: 280, y: 400, w: 60, h: 200 },
                    
                    { x: 460, y: 0, w: 60, h: 200 },
                    { x: 460, y: 400, w: 60, h: 200 }
                ]
            },
            {
                name: "Zkouška: Victory Road",
                bgColor: "#b0b8b0", // Skalní plošina
                pathColor: "#98a098",
                wallType: "boulder",
                walls: [
                    // Klasický klikatý "had" z balvanů, perfektně průjezdný zleva doprava
                    { x: 160, y: 0, w: 60, h: 460 },   // průchod dole (140px)
                    { x: 320, y: 140, w: 60, h: 460 }, // průchod nahoře (140px)
                    { x: 480, y: 0, w: 60, h: 460 },   // průchod dole (140px)
                    { x: 620, y: 140, w: 60, h: 460 }  // průchod nahoře (140px)
                ]
            }
        ];

        let currentArenaIndex = 0;
        let walls = [];
        let bullets = [];
        let particles = [];
        let gameOver = false;
        let lastTime = 0;

        // Částice (GBA styl kouře a jiker)
        class Particle {
            constructor(x, y, isBig = false) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = isBig ? (Math.random() * 4 + 2) : (Math.random() * 2 + 1);
                this.dx = Math.cos(angle) * speed;
                this.dy = Math.sin(angle) * speed;
                this.size = isBig ? (Math.random() * 8 + 4) : (Math.random() * 4 + 2);
                this.life = isBig ? (Math.random() * 25 + 15) : (Math.random() * 12 + 6);
                
                const colors = ['#f8a858', '#f8d050', '#f8f8f8', '#b0b8b0', '#707870'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            update() {
                this.x += this.dx;
                this.y += this.dy;
                this.life--;
                if (this.size > 0.5) this.size -= 0.12;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(Math.floor(this.x - this.size/2), Math.floor(this.y - this.size/2), Math.floor(this.size), Math.floor(this.size));
            }
        }

        class Tank {
            constructor(x, y, baseColor, treadColor, controls, pNum) {
                this.startX = x;
                this.startY = y;
                this.baseColor = baseColor;
                this.treadColor = treadColor;
                this.controls = controls;
                this.pNum = pNum;
                this.width = 28;
                this.height = 28;
                this.resetPosition();
            }

            resetPosition() {
                this.x = this.startX;
                this.y = this.startY;
                this.speed = 2.8;
                this.angle = this.pNum === 1 ? 0 : Math.PI;
                this.lives = 3;
                this.ammo = 5;
                this.maxAmmo = 5;
                this.lastShot = 0;
                this.ammoRegenTimer = 0;
            }

            update(deltaTime) {
                if (this.lives <= 0 || gameOver) return;

                let dx = 0;
                let dy = 0;

                if (keys[this.controls.up]) dy -= 1;
                if (keys[this.controls.down]) dy += 1;
                if (keys[this.controls.left]) dx -= 1;
                if (keys[this.controls.right]) dx += 1;

                if (dx !== 0 && dy !== 0) {
                    dx *= 0.7071;
                    dy *= 0.7071;
                }

                this.x += dx * this.speed;
                if (this.checkCollisions()) this.x -= dx * this.speed;

                this.y += dy * this.speed;
                if (this.checkCollisions()) this.y -= dy * this.speed;

                this.x = Math.max(this.width/2, Math.min(canvas.width - this.width/2, this.x));
                this.y = Math.max(this.height/2, Math.min(canvas.height - this.height/2, this.y));

                if (dx !== 0 || dy !== 0) {
                    this.angle = Math.atan2(dy, dx);
                }

                if (keys[this.controls.shoot] && this.ammo > 0 && Date.now() - this.lastShot > 350) {
                    this.shoot();
                }

                if (this.ammo < this.maxAmmo) {
                    this.ammoRegenTimer += deltaTime;
                    if (this.ammoRegenTimer > 1000) {
                        this.ammo++;
                        this.ammoRegenTimer = 0;
                        updateUI();
                    }
                }
            }

            checkCollisions() {
                for (let wall of walls) {
                    if (this.x - this.width/2 < wall.x + wall.w &&
                        this.x + this.width/2 > wall.x &&
                        this.y - this.height/2 < wall.y + wall.h &&
                        this.y + this.height/2 > wall.y) {
                        return true;
                    }
                }
                return false;
            }

            shoot() {
                this.ammo--;
                this.lastShot = Date.now();
                this.ammoRegenTimer = 0;
                
                const bx = this.x + Math.cos(this.angle) * 18;
                const by = this.y + Math.sin(this.angle) * 18;
                
                bullets.push(new Bullet(bx, by, this.angle, this.baseColor, this));
                updateUI();
            }

            draw() {
                if (this.lives <= 0) return;

                ctx.save();
                ctx.translate(Math.floor(this.x), Math.floor(this.y));
                ctx.rotate(this.angle);

                // GBA tank sprite s obrysem
                ctx.fillStyle = '#181818';
                ctx.fillRect(-13, -13, 26, 26);

                ctx.fillStyle = this.treadColor;
                ctx.fillRect(-12, -12, 24, 4);
                ctx.fillRect(-12, 8, 24, 4);

                ctx.fillStyle = this.baseColor;
                ctx.fillRect(-10, -8, 20, 16);

                ctx.fillStyle = '#f8f8f8'; 
                ctx.fillRect(-4, -4, 8, 8);
                ctx.fillStyle = this.baseColor;
                ctx.fillRect(-3, -3, 6, 6);

                ctx.fillStyle = this.treadColor;
                ctx.fillRect(2, -2, 12, 4);

                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle, color, owner) {
                this.x = x;
                this.y = y;
                this.speed = 6.5;
                this.dx = Math.cos(angle) * this.speed;
                this.dy = Math.sin(angle) * this.speed;
                this.size = 6;
                this.color = color;
                this.owner = owner;
                this.active = true;
            }

            update() {
                this.x += this.dx;
                this.y += this.dy;

                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                    this.active = false;
                    createExplosion(this.x, this.y, 4, false);
                }

                for (let wall of walls) {
                    if (this.x > wall.x && this.x < wall.x + wall.w &&
                        this.y > wall.y && this.y < wall.y + wall.h) {
                        this.active = false;
                        createExplosion(this.x, this.y, 4, false);
                    }
                }

                [player1, player2].forEach(tank => {
                    if (tank !== this.owner && tank.lives > 0) {
                        if (this.x > tank.x - tank.width/2 && this.x < tank.x + tank.width/2 &&
                            this.y > tank.y - tank.height/2 && this.y < tank.y + tank.height/2) {
                            
                            tank.lives--;
                            this.active = false;
                            updateUI();

                            if (tank.lives <= 0) {
                                createExplosion(tank.x, tank.y, 45, true);
                                checkWinCondition();
                            } else {
                                createExplosion(this.x, this.y, 10, false);
                            }
                        }
                    }
                });
            }

            draw() {
                ctx.fillStyle = '#f87870';
                ctx.fillRect(Math.floor(this.x - this.size/2), Math.floor(this.y - this.size/2), this.size, this.size);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(Math.floor(this.x - this.size/2), Math.floor(this.y - this.size/2), this.size, this.size);
            }
        }

        function createExplosion(x, y, count, isBig) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, isBig));
            }
        }

        let player1 = new Tank(60, 300, '#a83830', '#581810', { up: 'KeyW', down: 'KeyS', left: 'KeyA', right: 'KeyD', shoot: 'Space' }, 1);
        let player2 = new Tank(740, 300, '#385890', '#182848', { up: 'ArrowUp', down: 'ArrowDown', left: 'ArrowLeft', right: 'ArrowRight', shoot: 'Enter' }, 2);

        function loadArena(index) {
            const arena = arenaThemes[index];
            walls = arena.walls;
            document.getElementById('arena-title').innerText = arena.name;
            
            player1.resetPosition();
            player2.resetPosition();
            bullets = [];
            particles = [];
            gameOver = false;
            document.getElementById('game-over').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            document.getElementById('p1-stats').innerText = `Hráč 1 | Životy: ${'❤️'.repeat(player1.lives)}`;
            document.getElementById('p2-stats').innerText = `Hráč 2 | Životy: ${'❤️'.repeat(player2.lives)}`;
        }

        function checkWinCondition() {
            if (player1.lives <= 0 || player2.lives <= 0) {
                gameOver = true;
                const winnerText = document.getElementById('winner-text');
                if (player1.lives <= 0 && player2.lives <= 0) winnerText.innerText = "Remíza v duelu!";
                else if (player1.lives <= 0) winnerText.innerText = "Hráč 2 zvítězil!";
                else winnerText.innerText = "Hráč 1 zvítězil!";
                
                setTimeout(() => {
                    document.getElementById('game-over').style.display = 'block';
                }, 800);
            }
        }

        // Dynamické vykreslení cest přesně tam, kde nejsou stěny
        function drawBackground() {
            const theme = arenaThemes[currentArenaIndex];
            
            // 1. Vyplnění celého podkladu základní barvou (Tráva / Jeskynní dno)
            ctx.fillStyle = theme.bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 2. Vykreslení cest (Path) podél volných tras bludiště
            ctx.fillStyle = theme.pathColor;
            if (theme.wallType === "tree") {
                ctx.fillRect(0, 220, 800, 160); // Horizontální středová magistrála
                ctx.fillRect(160, 0, 60, 600);   // Vertikální uličky mezi stromy
                ctx.fillRect(480, 0, 60, 600);
            } else if (theme.wallType === "rock") {
                ctx.fillRect(260, 0, 280, 600); // Široký svislý středový průchod
                ctx.fillRect(0, 200, 800, 80);   // Horní obchvat
                ctx.fillRect(0, 340, 800, 80);   // Dolní obchvat
            } else if (theme.wallType === "gym-block") {
                // Stadion má vychozené křížové cesty kolem pilířů
                ctx.fillRect(0, 200, 800, 200);
                ctx.fillRect(280, 0, 240, 600);
            } else if (theme.wallType === "ruins") {
                ctx.fillRect(0, 200, 800, 200);
                ctx.fillRect(180, 0, 100, 600);
                ctx.fillRect(520, 0, 100, 600);
            } else if (theme.wallType === "boulder") {
                // Cesta kopíruje kompletní vlnovku Victory Road
                ctx.fillRect(0, 460, 220, 140);
                ctx.fillRect(160, 0, 220, 200);
                ctx.fillRect(320, 460, 220, 140);
                ctx.fillRect(480, 0, 220, 200);
                ctx.fillRect(620, 460, 180, 140);
            }

            // GBA pixelové detaily / textura země
            ctx.fillStyle = 'rgba(0,0,0,0.05)';
            for (let x = 32; x < canvas.width; x += 64) {
                for (let y = 32; y < canvas.height; y += 64) {
                    ctx.fillRect(x, y, 4, 4);
                    ctx.fillRect(x + 8, y + 4, 4, 4);
                }
            }
        }

        // Detailní GBA textury stěn
        function drawWalls() {
            const theme = arenaThemes[currentArenaIndex];
            
            walls.forEach(wall => {
                ctx.save();
                
                if (theme.wallType === "tree") {
                    ctx.fillStyle = "#286838"; 
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                    ctx.fillStyle = "#409858"; 
                    for(let iy = wall.y; iy < wall.y + wall.h; iy += 20) {
                        ctx.fillRect(wall.x + 4, iy + 2, wall.w - 8, 8);
                        ctx.fillStyle = "#184820"; 
                        ctx.fillRect(wall.x + 2, iy + 14, wall.w - 4, 2);
                        ctx.fillStyle = "#409858";
                    }
                } 
                else if (theme.wallType === "rock") {
                    ctx.fillStyle = "#705848";
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                    ctx.fillStyle = "#483830"; 
                    for(let ix = wall.x; ix < wall.x + wall.w; ix += 20) {
                        for(let iy = wall.y; iy < wall.y + wall.h; iy += 20) {
                            ctx.fillRect(ix, iy, 2, 20);
                            ctx.fillRect(ix, iy, 20, 2);
                            ctx.fillStyle = "#907868"; 
                            ctx.fillRect(ix + 4, iy + 4, 6, 6);
                            ctx.fillStyle = "#483830";
                        }
                    }
                } 
                else if (theme.wallType === "gym-block") {
                    ctx.fillStyle = "#6890a0";
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                    ctx.strokeStyle = "#385060";
                    ctx.lineWidth = 2;
                    ctx.strokeRect(wall.x + 4, wall.y + 4, wall.w - 8, wall.h - 8);
                    ctx.fillStyle = "#f8d050";
                    ctx.fillRect(wall.x + wall.w/2 - 4, wall.y + 8, 8, wall.h - 16);
                } 
                else if (theme.wallType === "ruins") {
                    ctx.fillStyle = "#886850";
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                    ctx.fillStyle = "#503828"; 
                    for (let y = wall.y; y < wall.y + wall.h; y += 10) {
                        ctx.fillRect(wall.x, y, wall.w, 2);
                        let offset = (Math.floor(y/10) % 2) * 10;
                        for (let x = wall.x + offset; x < wall.x + wall.w; x += 20) {
                            ctx.fillRect(x, y, 2, 10);
                        }
                    }
                } 
                else if (theme.wallType === "boulder") {
                    ctx.fillStyle = "#889098";
                    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
                    ctx.fillStyle = "#505860"; 
                    for (let iy = wall.y; iy < wall.y + wall.h; iy += 30) {
                        ctx.beginPath();
                        ctx.arc(wall.x + wall.w/2, iy + 15, 12, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = "#b0b8c0"; 
                        ctx.fillRect(wall.x + wall.w/2 - 4, iy + 8, 6, 4);
                        ctx.fillStyle = "#505860";
                    }
                }

                // GBA Černý obrys objektů
                ctx.strokeStyle = "#202020";
                ctx.lineWidth = 3;
                ctx.strokeRect(wall.x, wall.y, wall.w, wall.h);
                
                ctx.restore();
            });
        }

        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            player1.update(deltaTime);
            player2.update(deltaTime);

            bullets.forEach(b => b.update());
            bullets = bullets.filter(b => b.active);

            particles.forEach(p => p.update());
            particles = particles.filter(p => p.life > 0);

            drawBackground();
            drawWalls();
            
            player1.draw();
            player2.draw();
            bullets.forEach(b => b.draw());
            particles.forEach(p => p.draw());

            requestAnimationFrame(gameLoop);
        }

        function nextArena() {
            currentArenaIndex = (currentArenaIndex + 1) % arenaThemes.length;
            loadArena(currentArenaIndex);
        }

        // Spuštění
        loadArena(currentArenaIndex);
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
